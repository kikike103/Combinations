  <style>
    :root {
      --primary: #5865F2;
      --primary-hover: #4752c4;
      --accent: #a066ff;
      --dark-bg: #111214;
      --card-bg: #1e1f22;
      --sidebar-bg: #18191c;
      --text-main: #f2f3f5;
      --text-muted: #b5bac1;
      --border: rgba(255,255,255,0.08);
      --gradient: linear-gradient(135deg, #5865F2 0%, #a066ff 100%);
      
      /* Callout Colors */
      --info-bg: rgba(88, 101, 242, 0.1);
      --info-border: #5865F2;
      --warn-bg: rgba(237, 66, 69, 0.1);
      --warn-border: #ed4245;
      --tip-bg: rgba(59, 165, 92, 0.1);
      --tip-border: #3ba55c;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--dark-bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; transition: color 0.2s; }
    ul { list-style: none; }
    
    /* --- Navbar --- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background-color: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 1000;
    }

    .nav-logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .discord-btn-nav {
      background: var(--gradient);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.3s;
    }
    
    .discord-btn-nav:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(160, 102, 255, 0.4); }

    /* --- LAYOUT --- */
    .wiki-container {
      display: grid;
      grid-template-columns: 260px 1fr 240px;
      max-width: 1600px;
      margin: 70px auto 0;
      min-height: calc(100vh - 70px);
    }

    /* 1. Bal oldali Navigáció */
    .sidebar-left {
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 30px 20px;
      position: sticky;
      top: 70px;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }

    .sidebar-group { margin-bottom: 25px; }
    .sidebar-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .sidebar-link {
      display: block;
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2px;
      cursor: pointer;
    }

    .sidebar-link:hover { background-color: rgba(255,255,255,0.05); color: var(--text-main); }
    .sidebar-link.active {
      background-color: rgba(88, 101, 242, 0.1);
      color: var(--primary);
      font-weight: 600;
      border-left: 3px solid var(--primary);
    }

    /* 2. Fő Tartalom */
    .main-content {
      padding: 40px 60px;
      max-width: 950px;
      margin: 0 auto;
      width: 100%;
    }

    /* Typography */
    h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; color: white; }
    h2 { font-size: 1.8rem; margin: 50px 0 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); scroll-margin-top: 100px; color: var(--text-main); }
    h3 { font-size: 1.3rem; margin: 30px 0 15px; color: var(--accent); font-weight: 700; }
    p { margin-bottom: 15px; color: #d0d3d8; font-size: 1.05rem; }
    
    .lead { font-size: 1.2rem; color: var(--text-muted); font-weight: 300; margin-bottom: 30px; }

    /* Tables */
    .wiki-table {
      width: 100%;
      border-collapse: collapse;
      margin: 25px 0;
      background-color: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .wiki-table th, .wiki-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
    .wiki-table th { background-color: rgba(0,0,0,0.2); color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
    .wiki-table tr:last-child td { border-bottom: none; }
    .wiki-table tr:hover { background-color: rgba(255,255,255,0.02); }
    
    code { background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 0.85rem; }

    /* Keresőmező stílus */
    .cmd-search-input {
      width: 100%;
      padding: 15px;
      background-color: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      margin-bottom: 20px;
      transition: border-color 0.3s;
      font-family: 'Inter', sans-serif;
    }
    
    .cmd-search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Callouts */
    .callout {
      padding: 20px;
      margin: 25px 0;
      border-radius: 6px;
      border-left: 4px solid;
      background-color: var(--card-bg);
      display: flex;
      gap: 15px;
      align-items: start;

    .callout-icon { font-size: 1.2rem; margin-top: 2px; }
    
    .callout.info { border-color: var(--info-border); background-color: var(--info-bg); }
    .callout.info .callout-icon { color: var(--info-border); }
    
    .callout.warn { border-color: var(--warn-border); background-color: var(--warn-bg); }
    .callout.warn .callout-icon { color: var(--warn-border); }
    
    .callout.tip { border-color: var(--tip-border); background-color: var(--tip-bg); }
    .callout.tip .callout-icon { color: var(--tip-border); }

    /* FAQ */
    details {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    details[open] { border-color: var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    
    summary {
      padding: 15px 20px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      list-style: none;
      color: var(--text-main);
    }
    
    summary::-webkit-details-marker { display: none; }
    
    summary:after {
      content: '\f078';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      transition: transform 0.3s;
    }
    
    details[open] summary:after { transform: rotate(180deg); color: var(--primary); }
    
    .faq-content {
      padding: 0 20px 20px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 15px;
    }

    /* 3. Jobb oldali TOC */
    .sidebar-right {
      padding: 40px 20px;
      position: sticky;
      top: 70px;
      height: calc(100vh - 70px);
      border-left: 1px solid var(--border);
    }
    .toc-title { font-size: 0.8rem; font-weight: 700; color: var(--text-main); margin-bottom: 15px; }
    .toc-list li { margin-bottom: 10px; }
    .toc-list a { font-size: 0.85rem; color: var(--text-muted); display: block; border-left: 2px solid transparent; padding-left: 10px; }
    .toc-list a:hover { color: var(--primary); border-left-color: var(--primary); }

      font-weight: 600;
      display: inline-flex;

    /* Responsive */

      .sidebar-left { display: none; }

      .btn-buy { width: 100%; justify-content: center; font-size: 1.1rem; }
    }
  </style>
</head>

    // --- JS LOGIKA ---
    function loadPage(pageId) {
      const data = wikiData[pageId];
      if (!data) return;

      const mainContent = document.getElementById('mainContent');
      mainContent.style.opacity = '0';
      
      setTimeout(() => {
        mainContent.innerHTML = data.content;
        mainContent.style.opacity = '1';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 200);

      const tocList = document.getElementById('tocList');
      tocList.innerHTML = '';
      
      data.toc.forEach(item => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `#${item.id}`;
        a.textContent = item.text;
        
        a.addEventListener('click', function(e) {
          e.preventDefault();
          const target = document.getElementById(item.id);
          if (target) target.scrollIntoView({ behavior: 'smooth' });
        });
        
        li.appendChild(a);
        tocList.appendChild(li);
      });

      document.querySelectorAll('.sidebar-link').forEach(link => {
        link.classList.remove('active');
      });
      const activeLink = Array.from(document.querySelectorAll('.sidebar-link')).find(l => l.getAttribute('onclick').includes(pageId));
      if (activeLink) activeLink.classList.add('active');
    }

    // --- KERESŐ FUNKCIÓ (Az összes táblázatban keres) ---
    function filterCommands() {
      // 1. A beírt szöveg lekérése
      var input = document.getElementById("cmdSearch");
      var filter = input.value.toUpperCase();
      
      // 2. Az összes releváns táblázat lekérése
      var tables = document.querySelectorAll(".searchable-table");
      
      // 3. Végigmegyünk az összes táblázaton
      tables.forEach(table => {
        var tr = table.getElementsByTagName("tr");
        
        // Végigmegyünk a sorokon (0. sor a fejléc, azt kihagyjuk)
        for (var i = 1; i < tr.length; i++) {
          var tdPerm = tr[i].getElementsByTagName("td")[0]; // Jog oszlop
          var tdCmd = tr[i].getElementsByTagName("td")[1];  // Parancs oszlop
          var tdDesc = tr[i].getElementsByTagName("td")[2]; // Leírás oszlop
          
          if (tdPerm || tdCmd || tdDesc) {
            var txtValuePerm = tdPerm.textContent || tdPerm.innerText;
            var txtValueCmd = tdCmd.textContent || tdCmd.innerText;
            var txtValueDesc = tdDesc.textContent || tdDesc.innerText;
            
            // Ha bármelyik oszlopban megtalálható a keresett szöveg
            if (txtValuePerm.toUpperCase().indexOf(filter) > -1 || 
                txtValueCmd.toUpperCase().indexOf(filter) > -1 ||
                txtValueDesc.toUpperCase().indexOf(filter) > -1) {
              tr[i].style.display = ""; // Mutasd
            } else {
              tr[i].style.display = "none"; // Rejtsd el
            }
          }       
        }
      });
    }

    // Kezdeti betöltés
    document.addEventListener('DOMContentLoaded', () => {
      loadPage('core');
    });
